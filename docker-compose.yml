services:
  db:
    image: postgres:16-alpine
    container_name: servico-facil-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servico_facil
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: servico-facil-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/servico_facil?schema=public"
      CORS_ORIGIN: "http://localhost:3001"
      NODE_ENV: production
      JWT_SECRET: "${JWT_SECRET:-docker-dev-secret-change}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-docker-dev-refresh-secret-change}"

  web:
    build: ./web
    container_name: servico-facil-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000/api"
      AUTH_SECRET: "${AUTH_SECRET:-docker-dev-auth-secret-change}"
      AUTH_URL: "http://localhost:3001"

volumes:
  postgres-data:
  uploads:
